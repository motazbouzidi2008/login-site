<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
}
input{
  display:block;
  margin:10px;
  padding:10px;
  width:200px;
}
button{
  padding:10px;
  width:220px;
  background:#4facfe;
  color:white;
  border:none;
}
</style>
</head>
<body>

<div class="box">
  <h2>Login</h2>
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button>Login</button>
</div>

</body>
</html>
